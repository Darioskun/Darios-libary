<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darios Libary - Music Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-music"></i>
                <h1>Darios Libary</h1>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="home">
                    <i class="fas fa-home"></i>
                    <span>Trang chủ</span>
                </a>
                <a href="#" class="nav-item" data-view="library">
                    <i class="fas fa-compact-disc"></i>
                    <span>Thư viện</span>
                </a>
                <a href="#" class="nav-item" data-view="playlists">
                    <i class="fas fa-list"></i>
                    <span>Danh sách phát</span>
                </a>
                <a href="#" class="nav-item" data-view="upload">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Tải lên</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Home View -->
            <section id="home-view" class="view active">
                <div class="header">
                    <h2>Trang chủ</h2>
                </div>
                <div class="playlists-grid" id="playlists-grid">
                    <!-- Playlists will be loaded here -->
                </div>
            </section>

            <!-- Library View -->
            <section id="library-view" class="view">
                <div class="header">
                    <h2>Thư viện</h2>
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Tìm kiếm video...">
                        <button id="search-btn"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <div class="videos-list" id="videos-list">
                    <!-- Videos will be loaded here -->
                </div>
            </section>

            <!-- Playlists View -->
            <section id="playlists-view" class="view">
                <div class="header">
                    <h2>Danh sách phát</h2>
                    <button id="create-playlist-btn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Tạo danh sách phát
                    </button>
                </div>
                <div class="playlists-list" id="playlists-list">
                    <!-- Playlists will be loaded here -->
                </div>
            </section>

            <!-- Upload View -->
            <section id="upload-view" class="view">
                <div class="header">
                    <h2>Tải lên video</h2>
                </div>
                <div class="upload-container">
                    <div class="upload-area" id="upload-area">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <h3>Kéo video vào đây hoặc nhấp để chọn</h3>
                        <p>Hỗ trợ: MP4, WebM, Ogg, MP3, WAV (Tối đa 500MB)</p>
                    </div>
                    <input type="file" id="file-input" accept="video/*,audio/*" style="display: none;">
                    
                    <div class="upload-form">
                        <label>
                            <span>Tiêu đề:</span>
                            <input type="text" id="video-title" placeholder="Nhập tiêu đề video">
                        </label>
                        <label>
                            <span>Nghệ sĩ:</span>
                            <input type="text" id="video-artist" placeholder="Nhập tên nghệ sĩ">
                        </label>
                        <button id="upload-btn" class="btn btn-primary">Tải lên</button>
                    </div>

                    <div id="upload-progress" style="display: none;">
                        <div class="progress-bar">
                            <div id="progress-fill"></div>
                        </div>
                        <p id="progress-text">Đang tải lên: 0%</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Player -->
    <div class="player">
        <div class="player-info">
            <div class="player-cover">
                <i class="fas fa-music"></i>
            </div>
            <div class="player-details">
                <div class="player-title" id="player-title">Chọn một video để phát</div>
                <div class="player-artist" id="player-artist">-</div>
            </div>
        </div>

        <div class="player-controls">
            <button id="shuffle-btn" title="Trộn đều">
                <i class="fas fa-random"></i>
            </button>
            <button id="prev-btn" title="Bài trước">
                <i class="fas fa-step-backward"></i>
            </button>
            <button id="play-btn" title="Phát / Dừng">
                <i class="fas fa-play"></i>
            </button>
            <button id="next-btn" title="Bài tiếp theo">
                <i class="fas fa-step-forward"></i>
            </button>
            <button id="repeat-btn" title="Lặp" data-repeat="off">
                <i class="fas fa-redo"></i>
            </button>
        </div>

        <div class="player-progress">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0">
            <span id="duration">0:00</span>
        </div>

        <div class="player-volume">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="70">
        </div>

        <div class="player-queue">
            <button id="queue-btn" title="Danh sách phát hiện tại">
                <i class="fas fa-list"></i>
            </button>
        </div>
    </div>

    <!-- Queue Modal -->
    <div id="queue-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Danh sách phát hiện tại</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="queue-list" class="queue-list">
                    <!-- Queue items will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Playlist Modal -->
    <div id="playlist-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tạo danh sách phát mới</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <label>
                    <span>Tên danh sách phát:</span>
                    <input type="text" id="playlist-name" placeholder="Nhập tên danh sách phát">
                </label>
                <label>
                    <span>Mô tả:</span>
                    <textarea id="playlist-description" placeholder="Nhập mô tả (không bắt buộc)"></textarea>
                </label>
                <button id="save-playlist-btn" class="btn btn-primary">Tạo</button>
            </div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div id="video-player-modal" class="modal">
        <div class="modal-content modal-video">
            <button class="modal-close">&times;</button>
            <video id="modal-video" controls style="width: 100%; height: auto;"></video>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
